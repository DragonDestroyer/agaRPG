<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGARPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: system-ui, -apple-system, sans-serif;
            color: #fff;
        }
        #launcher {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }
        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
        }
        #run-btn {
            font-size: 1.4rem;
            padding: 1rem 3rem;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        #run-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255,255,255,0.4);
        }
        #run-btn:active {
            transform: scale(0.98);
        }
        #game-container {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #111;
        }
        #loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="launcher">
        <h1>AGARPG</h1>
        <button id="run-btn">Run Game</button>
    </div>

    <div id="game-container">
        <div id="loading">Loading Python...</div>
        <canvas id="game-canvas"></canvas>
    </div>

    <script type="module">
        import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.mjs";

        const launcher = document.getElementById("launcher");
        const gameContainer = document.getElementById("game-container");
        const canvas = document.getElementById("game-canvas");
        const loading = document.getElementById("loading");
        const runBtn = document.getElementById("run-btn");

        runBtn.addEventListener("click", async () => {
            // Hide launcher, show game area (full page, not browser fullscreen)
            launcher.style.display = "none";
            gameContainer.style.display = "block";
            loading.style.display = "block";

            // Make canvas fill the entire page
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Load Pyodide
            const pyodide = await loadPyodide({
                indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.0/full/"
            });

            // Expose canvas to Python
            pyodide.globals.set("canvas", canvas);
            pyodide.globals.set("ctx", canvas.getContext("2d"));

            // Fetch and run main.py
            const response = await fetch("./game_files/main.py");
            const code = await response.text();
            await pyodide.runPythonAsync(code);

            loading.style.display = "none";
        });

        // Handle resize
        window.addEventListener("resize", () => {
            if (gameContainer.style.display === "block") {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
